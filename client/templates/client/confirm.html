{% extends 'client/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <h4 class="card-title mb-4">📝 確認辨識結果</h4>
                <form id="invoiceForm">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">發票號碼</label>
                            <input type="text" class="form-control" name="number" id="number">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">日期</label>
                            <input type="date" class="form-control" name="date" id="date">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">總金額</label>
                        <input type="number" class="form-control" name="total" id="total">
                    </div>

                    <h5 class="mt-4">商品明細</h5>
                    <div id="itemsContainer">
                        <!-- Items will be injected here -->
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success btn-lg">確認送出</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// === 頁面初始化與資料載入 ===
document.addEventListener('DOMContentLoaded', () => {
    const data = JSON.parse(sessionStorage.getItem('invoiceData'));
    if (!data) return;

    document.getElementById('number').value = data.number;
    document.getElementById('date').value = data.date;
    document.getElementById('total').value = data.total;

    const container = document.getElementById('itemsContainer');
    data.items.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'row g-2 mb-2 border-bottom pb-2';
        div.innerHTML = `
            <div class="col-5">
                <input type="text" class="form-control" value="${item.name}" placeholder="品名">
            </div>
            <div class="col-2">
                <input type="number" class="form-control" value="${item.qty}" placeholder="數量">
            </div>
            <div class="col-3">
                <input type="number" class="form-control" value="${item.price}" placeholder="單價">
            </div>
            <div class="col-2">
                <select class="form-select bg-dark text-white border-secondary">
                    <option value="飲食" ${item.category === '飲食' ? 'selected' : ''}>飲食</option>
                    <option value="其它" ${item.category === '其它' ? 'selected' : ''}>其它</option>
                </select>
            </div>
        `;
        container.appendChild(div);
    });
});

// === 表單提交處理 ===
document.getElementById('invoiceForm').onsubmit = (e) => {
    e.preventDefault();
    alert('感謝確認！儲存功能開發中...');
};
</script>
{% endblock %}
